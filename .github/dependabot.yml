version: 2
updates:
  # API — Fastify + Node.js dependencies
  - package-ecosystem: "npm"
    directory: "/api"
    schedule:
      interval: "weekly"
    labels:
      - "dependencies"

  # Web — React + Vite frontend dependencies
  - package-ecosystem: "npm"
    directory: "/web"
    schedule:
      interval: "weekly"
    labels:
      - "dependencies"

  # Worker — Node.js zone worker dependencies
  - package-ecosystem: "npm"
    directory: "/worker"
    schedule:
      interval: "weekly"
    labels:
      - "dependencies"

  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    labels:
      - "dependencies"

  # Docker images (docker-compose.yml at repo root)
  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "weekly"
    labels:
      - "dependencies"

name: Deploy — ns2 (secondary)

on:
  push:
    branches: [main]
    paths:
      - 'bind/secondary2/**'
      - 'bind/tsig.key'
      - '.github/workflows/deploy-ns2.yml'
  workflow_run:
    workflows: ["Deploy — ns1 (primary)"]
    types: [completed]
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    if: ${{ github.event_name == 'push' || github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Parse host from SSH_PATH_NS2
        id: parse
        run: |
          SSH_PATH="${{ vars.SSH_PATH_NS2 }}"
          SSH_HOST="${SSH_PATH%%:*}"
          echo "host=${SSH_HOST}" >> $GITHUB_OUTPUT
          echo "hostname=${SSH_HOST#*@}" >> $GITHUB_OUTPUT

      - name: Set up SSH
        run: |
          install -m 600 -D /dev/null ~/.ssh/id_ed25519
          echo "${{ secrets.SSH_KEY_NS2 }}" > ~/.ssh/id_ed25519
          ssh-keyscan -H "${{ steps.parse.outputs.hostname }}" >> ~/.ssh/known_hosts

      - name: Ensure BIND is installed on ns2
        run: |
          ssh ${{ steps.parse.outputs.host }} "
            if ! command -v named-checkconf >/dev/null 2>&1; then
              sudo apt-get update -qq && sudo apt-get install -y -qq bind9 bind9-utils
            fi
          "

      - name: Sync BIND config to /etc/bind on ns2
        run: |
          rsync -az --delete \
            --exclude='zones/' \
            --exclude='tsig.key' \
            --rsync-path='sudo rsync' \
            bind/secondary2/ ${{ steps.parse.outputs.host }}:/etc/bind/

      - name: Sync tsig.key to /etc/bind on ns2
        run: |
          rsync -az \
            --rsync-path='sudo rsync' \
            bind/tsig.key ${{ steps.parse.outputs.host }}:/etc/bind/tsig.key

      - name: Validate and reload BIND on ns2
        run: |
          ssh ${{ steps.parse.outputs.host }} "
            sudo named-checkconf &&
            sudo rndc reconfig
          "

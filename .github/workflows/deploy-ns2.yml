name: Deploy — ns2 (secondary)

on:
  push:
    branches: [main]
    paths:
      - 'bind/secondary2/**'
      - 'bind/tsig.key'
      - '.github/workflows/deploy-ns2.yml'
  workflow_run:
    workflows: ["Deploy — ns1 (primary)"]
    types: [completed]
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    if: ${{ github.event_name == 'push' || github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Parse host and path from SSH_PATH_NS2
        id: parse
        run: |
          SSH_PATH="${{ vars.SSH_PATH_NS2 }}"
          SSH_HOST="${SSH_PATH%%:*}"
          echo "host=${SSH_HOST}" >> $GITHUB_OUTPUT
          echo "hostname=${SSH_HOST#*@}" >> $GITHUB_OUTPUT
          echo "path=${SSH_PATH#*:}" >> $GITHUB_OUTPUT

      - name: Set up SSH
        run: |
          install -m 600 -D /dev/null ~/.ssh/id_ed25519
          echo "${{ secrets.SSH_KEY_NS2 }}" > ~/.ssh/id_ed25519
          ssh-keyscan -H "${{ steps.parse.outputs.hostname }}" >> ~/.ssh/known_hosts

      - name: Sync BIND config to ns2
        run: |
          rsync -az --delete \
            bind/secondary2/ ${{ vars.SSH_PATH_NS2 }}/

      - name: Reload BIND on ns2
        run: |
          ssh ${{ steps.parse.outputs.host }} "
            /usr/sbin/named-checkconf ${{ steps.parse.outputs.path }}/named.conf &&
            /usr/sbin/rndc reconfig
          "

name: Deploy — ns1 (primary)

on:
  push:
    branches: [main]
    paths-ignore:
      - 'bind/secondary1/**'
      - 'bind/secondary2/**'
      - 'bind/secondary3/**'
      - '.github/workflows/deploy-ns2.yml'
      - '.github/workflows/deploy-ns3.yml'
      - 'README.md'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Parse host and path from SSH_PATH_NS1
        id: parse
        run: |
          SSH_PATH="${{ vars.SSH_PATH_NS1 }}"
          SSH_HOST="${SSH_PATH%%:*}"
          echo "host=${SSH_HOST}" >> $GITHUB_OUTPUT
          echo "hostname=${SSH_HOST#*@}" >> $GITHUB_OUTPUT
          echo "path=${SSH_PATH#*:}" >> $GITHUB_OUTPUT

      - name: Set up SSH
        run: |
          install -m 600 -D /dev/null ~/.ssh/id_ed25519
          echo "${{ secrets.SSH_KEY_NS1 }}" > ~/.ssh/id_ed25519
          ssh-keyscan -H "${{ steps.parse.outputs.hostname }}" >> ~/.ssh/known_hosts

      - name: Generate gource visualisation video
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq gource ffmpeg xvfb
          DATE=$(date +%Y%m%d)
          FIRST=$(git log --reverse --format="%at" | head -1)
          LAST=$(git log --format="%at" | head -1)
          DAYS=$(( (LAST - FIRST) / 86400 + 1 ))
          [ "$DAYS" -lt 1 ] && DAYS=1
          SPD=$(echo "scale=6; 180.0 / $DAYS" | bc)
          mkdir -p web/src/assets
          xvfb-run -a --server-args="-screen 0 1280x720x24" \
            gource \
              --seconds-per-day "$SPD" \
              --auto-skip-seconds 0.5 \
              --max-files 0 \
              --hide filenames \
              --multi-sampling \
              --stop-at-end \
              -1280x720 \
              -r 25 \
              -o - \
            | ffmpeg -y -r 25 -f image2pipe -vcodec ppm -i - \
                -vcodec libx264 -preset fast -pix_fmt yuv420p -crf 28 \
                -movflags +faststart \
                web/src/assets/gource-${DATE}.mp4
          [ -s "web/src/assets/gource-${DATE}.mp4" ] || { echo "ERROR: gource video was not created or is empty"; exit 1; }
          echo "GOURCE_FILE=web/src/assets/gource-${DATE}.mp4" >> $GITHUB_ENV

      - name: Sync repository to ns1
        run: |
          rsync -az --delete \
            --exclude='.git/' \
            --exclude='.github/' \
            --exclude='bind/secondary1/' \
            --exclude='bind/secondary2/' \
            --exclude='bind/secondary3/' \
            --exclude='.env' \
            --exclude='bind/keys/rndc.key' \
            --exclude='bind/keys/tsig.key' \
            --exclude='mariadb/data/' \
            --exclude='web/node_modules/' \
            --exclude='api/node_modules/' \
            --exclude='worker/node_modules/' \
            --exclude='bind/primary/zones/' \
            --exclude='bind/primary/keys-dnssec/' \
            --exclude='web/src/assets/gource-*' \
            ./ ${{ vars.SSH_PATH_NS1 }}/

      - name: Copy gource video to ns1
        run: |
          rsync -az \
            "$GOURCE_FILE" \
            ${{ vars.SSH_PATH_NS1 }}/web/src/assets/

      - name: Parse ns2 and ns3 hosts
        id: parse-secondaries
        run: |
          NS2="${{ vars.SSH_PATH_NS2 }}"
          NS2_HOST="${NS2%%:*}"
          echo "ns2_host=${NS2_HOST}" >> $GITHUB_OUTPUT
          echo "ns2_hostname=${NS2_HOST#*@}" >> $GITHUB_OUTPUT

          NS3="${{ vars.SSH_PATH_NS3 }}"
          NS3_HOST="${NS3%%:*}"
          echo "ns3_host=${NS3_HOST}" >> $GITHUB_OUTPUT
          echo "ns3_hostname=${NS3_HOST#*@}" >> $GITHUB_OUTPUT

      - name: Set up SSH for ns2 and ns3
        run: |
          install -m 600 -D /dev/null ~/.ssh/id_ns2
          echo "${{ secrets.SSH_KEY_NS2 }}" > ~/.ssh/id_ns2
          install -m 600 -D /dev/null ~/.ssh/id_ns3
          echo "${{ secrets.SSH_KEY_NS3 }}" > ~/.ssh/id_ns3
          ssh-keyscan -H "${{ steps.parse-secondaries.outputs.ns2_hostname }}" >> ~/.ssh/known_hosts
          ssh-keyscan -H "${{ steps.parse-secondaries.outputs.ns3_hostname }}" >> ~/.ssh/known_hosts

      - name: Init BIND keys on ns1 if missing
        run: |
          ssh ${{ steps.parse.outputs.host }} "
            cd ${{ steps.parse.outputs.path }}
            if [ ! -f bind/keys/rndc.key ]; then
              echo 'Generating rndc.key...'
              SECRET=\$(openssl rand -base64 32)
              printf 'key \"rndc-key\" {\n\talgorithm hmac-sha256;\n\tsecret \"%s\";\n};\n' \"\$SECRET\" > bind/keys/rndc.key
              chmod 644 bind/keys/rndc.key
              echo 'rndc.key created.'
            else
              chmod 644 bind/keys/rndc.key
              echo 'rndc.key already exists — skipping'
            fi
            if [ ! -f bind/keys/tsig.key ]; then
              echo 'Generating tsig.key...'
              SECRET=\$(openssl rand -base64 32)
              printf 'key \"tsig-secondary\" {\n\talgorithm hmac-sha256;\n\tsecret \"%s\";\n};\n' \"\$SECRET\" > bind/keys/tsig.key
              chmod 644 bind/keys/tsig.key
              echo 'tsig.key created.'
            else
              chmod 644 bind/keys/tsig.key
              echo 'tsig.key already exists — skipping'
            fi
            [ -f bind/primary/named.conf.local ] || touch bind/primary/named.conf.local
          "

      - name: Distribute tsig.key to ns2 and ns3 if missing
        run: |
          ssh ${{ steps.parse.outputs.host }} "cat ${{ steps.parse.outputs.path }}/bind/keys/tsig.key" > /tmp/tsig.key

          if ssh -i ~/.ssh/id_ns2 ${{ steps.parse-secondaries.outputs.ns2_host }} \
              "[ ! -f /etc/bind/tsig.key ]"; then
            rsync -e "ssh -i ~/.ssh/id_ns2" --rsync-path='sudo rsync' \
              /tmp/tsig.key ${{ steps.parse-secondaries.outputs.ns2_host }}:/etc/bind/tsig.key
            echo "tsig.key written to ns2"
          else
            echo "tsig.key already exists on ns2 — skipping"
          fi

          if ssh -i ~/.ssh/id_ns3 ${{ steps.parse-secondaries.outputs.ns3_host }} \
              "[ ! -f /etc/bind/tsig.key ]"; then
            rsync -e "ssh -i ~/.ssh/id_ns3" --rsync-path='sudo rsync' \
              /tmp/tsig.key ${{ steps.parse-secondaries.outputs.ns3_host }}:/etc/bind/tsig.key
            echo "tsig.key written to ns3"
          else
            echo "tsig.key already exists on ns3 — skipping"
          fi

          rm -f /tmp/tsig.key

      - name: Distribute rndc.key to ns2 and ns3 if missing
        run: |
          ssh ${{ steps.parse.outputs.host }} "cat ${{ steps.parse.outputs.path }}/bind/keys/rndc.key" > /tmp/rndc.key

          if ssh -i ~/.ssh/id_ns2 ${{ steps.parse-secondaries.outputs.ns2_host }} \
              "[ ! -f /etc/bind/rndc.key ]"; then
            rsync -e "ssh -i ~/.ssh/id_ns2" --rsync-path='sudo rsync' \
              /tmp/rndc.key ${{ steps.parse-secondaries.outputs.ns2_host }}:/etc/bind/rndc.key
            echo "rndc.key written to ns2"
          else
            echo "rndc.key already exists on ns2 — skipping"
          fi

          if ssh -i ~/.ssh/id_ns3 ${{ steps.parse-secondaries.outputs.ns3_host }} \
              "[ ! -f /etc/bind/rndc.key ]"; then
            rsync -e "ssh -i ~/.ssh/id_ns3" --rsync-path='sudo rsync' \
              /tmp/rndc.key ${{ steps.parse-secondaries.outputs.ns3_host }}:/etc/bind/rndc.key
            echo "rndc.key written to ns3"
          else
            echo "rndc.key already exists on ns3 — skipping"
          fi

          rm -f /tmp/rndc.key

      - name: Deploy on ns1
        run: |
          ssh ${{ steps.parse.outputs.host }} "
            cd ${{ steps.parse.outputs.path }} &&
            mkdir -p bind/primary/zones bind/primary/keys-dnssec &&
            chmod 777 bind/primary/zones bind/primary &&
            docker compose pull --quiet 2>/dev/null || true &&
            docker compose up -d --build --force-recreate --remove-orphans
          "


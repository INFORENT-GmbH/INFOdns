name: Deploy — nbg1 (primary)

on:
  push:
    branches: [main]
    paths-ignore:
      - 'bind/secondary-hil1/**'
      - 'bind/secondary-hel1/**'
      - '.github/workflows/deploy-hil1.yml'
      - '.github/workflows/deploy-hel1.yml'
      - 'README.md'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up SSH
        run: |
          install -m 600 -D /dev/null ~/.ssh/id_ed25519
          printf '%s' "${{ secrets.SSH_KEY }}" | base64 -d > ~/.ssh/id_ed25519
          ssh-keyscan -H nbg1.dns.inforant.de >> ~/.ssh/known_hosts

      - name: Parse host and path from SSH_PATH_NBG1
        id: parse
        run: |
          SSH_PATH="${{ vars.SSH_PATH_NBG1 }}"
          echo "host=${SSH_PATH%%:*}" >> $GITHUB_OUTPUT
          echo "path=${SSH_PATH#*:}" >> $GITHUB_OUTPUT

      - name: Sync repository to nbg1
        run: |
          rsync -az --delete \
            --exclude='.git/' \
            --exclude='.github/' \
            --exclude='bind/secondary-hil1/' \
            --exclude='bind/secondary-hel1/' \
            --exclude='bind/secondary1/' \
            --exclude='bind/secondary2/' \
            --exclude='bind/secondary3/' \
            --exclude='.env' \
            --exclude='bind/rndc.key' \
            --exclude='bind/tsig.key' \
            --exclude='mariadb/data/' \
            --exclude='web/node_modules/' \
            --exclude='api/node_modules/' \
            --exclude='worker/node_modules/' \
            ./ ${{ vars.SSH_PATH_NBG1 }}/

      - name: Deploy on nbg1
        run: |
          ssh ${{ steps.parse.outputs.host }} "
            cd ${{ steps.parse.outputs.path }} &&
            mkdir -p bind/primary/zones &&
            chmod 777 bind/primary/zones bind/primary &&
            docker compose pull --quiet 2>/dev/null || true &&
            docker compose up -d --build --remove-orphans
          "

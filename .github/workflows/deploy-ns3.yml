name: Deploy — ns3 (secondary)

on:
  push:
    branches: [main]
    paths:
      - 'bind/secondary3/**'
      - 'bind/tsig.key'
      - '.github/workflows/deploy-ns3.yml'
  workflow_run:
    workflows: ["Deploy — ns1 (primary)"]
    types: [completed]
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    if: ${{ github.event_name == 'push' || github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Parse host and path from SSH_PATH_NS3
        id: parse
        run: |
          SSH_PATH="${{ vars.SSH_PATH_NS3 }}"
          SSH_HOST="${SSH_PATH%%:*}"
          echo "host=${SSH_HOST}" >> $GITHUB_OUTPUT
          echo "hostname=${SSH_HOST#*@}" >> $GITHUB_OUTPUT
          echo "path=${SSH_PATH#*:}" >> $GITHUB_OUTPUT

      - name: Set up SSH
        run: |
          install -m 600 -D /dev/null ~/.ssh/id_ed25519
          echo "${{ secrets.SSH_KEY_NS3 }}" > ~/.ssh/id_ed25519
          ssh-keyscan -H "${{ steps.parse.outputs.hostname }}" >> ~/.ssh/known_hosts

      - name: Sync BIND config to ns3
        run: |
          rsync -az --delete \
            bind/secondary3/ ${{ vars.SSH_PATH_NS3 }}/

      - name: Reload BIND on ns3
        run: |
          ssh ${{ steps.parse.outputs.host }} "
            named-checkconf ${{ steps.parse.outputs.path }}/named.conf &&
            rndc reconfig
          "

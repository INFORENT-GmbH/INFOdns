<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>INFOdns</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
    <style>
      *, *::before, *::after { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: 'Inter', system-ui, sans-serif;
        height: 100vh;
        overflow: hidden;
      }
      #root {
        height: 100%;
        overflow: hidden;
      }
      @keyframes spin { to { transform: rotate(360deg); } }
      input, select, textarea { transition: border-color 0.12s, box-shadow 0.12s; }
      :focus-visible { outline: 2px solid #2563eb; outline-offset: 2px; border-radius: 3px; }
      button { transition: filter 0.1s, opacity 0.1s; }
      button:hover:not(:disabled) { filter: brightness(0.92); }
      button:disabled { opacity: 0.55; cursor: not-allowed; }
      td { transition: background 0.08s; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>

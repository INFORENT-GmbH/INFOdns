# Map Upgrade header to Connection value for WebSocket proxying
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # SPA shell + everything not in /assets/ — never cache, always revalidate
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
        expires off;
    }

    # Vite hashed bundles (filename includes content hash → safe to cache forever)
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Proxy /api/v1/* → api:3000/api/v1/* (same-origin, no CORS)
    location /api/ {
        proxy_pass http://api:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        # WebSocket upgrade support
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_read_timeout 3600s;
        # Belt-and-braces: don't let intermediaries cache API responses
        add_header Cache-Control "no-store" always;
    }

    gzip on;
    gzip_types text/plain text/css application/javascript application/json;
}

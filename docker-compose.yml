services:

  # ── Database ────────────────────────────────────────────────
  db:
    image: mariadb:11
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MYSQL_DATABASE: infodns
      MYSQL_USER: infodns
      MYSQL_PASSWORD: ${DB_PASSWORD}
    volumes:
      - ./mariadb/data:/var/lib/mysql
      - ./mariadb/init:/docker-entrypoint-initdb.d
    networks:
      - internal
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 30s

  # PHPMYADMIN with auto login on port 8080
  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    restart: unless-stopped
    environment:
      PMA_HOST: db
      PMA_USER: infodns
      PMA_PASSWORD: ${DB_PASSWORD}
    ports:
      - "8080:80"
    networks:
      - internal
      - public

  # ── API ─────────────────────────────────────────────────────
  api:
    build: ./api
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_HOST: db
      DB_PORT: 3306
      DB_USER: infodns
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: infodns
      JWT_SECRET: ${JWT_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      INTERNAL_SECRET: ${INTERNAL_SECRET}
      NODE_ENV: ${NODE_ENV:-production}
      BIND_PRIMARY_HOST: bind-primary
      NS2_IP: ${NS2_IP:-80.243.196.38}
      NS3_IP: ${NS3_IP:-80.243.196.39}
    ports:
      - "3000:3000"
    volumes:
      - ./mariadb/migrations:/app/migrations:ro
      - ./uploads:/app/uploads
    networks:
      - internal
      - public

  # ── Worker ──────────────────────────────────────────────────
  worker:
    build: ./worker
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_HOST: db
      DB_PORT: 3306
      DB_USER: infodns
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: infodns
      BIND_PRIMARY_HOST: bind-primary
      BIND_PRIMARY_RNDC_PORT: 953
      RNDC_KEY_FILE: /etc/rndc/rndc.key
      # Real secondary IPs for also-notify in named.conf.local (ilreah, ulren)
      SECONDARY_IPS: ${SECONDARY_IPS:-80.243.196.38,80.243.196.39}
      NS_RECORDS: ${NS_RECORDS}          # comma-separated NS FQDNs for zone rendering
      SOA_MNAME: ${SOA_MNAME}
      SOA_RNAME: ${SOA_RNAME}
      INTERNAL_SECRET: ${INTERNAL_SECRET}
      API_INTERNAL_URL: http://api:3000
      NODE_ENV: ${NODE_ENV:-production}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_FROM: ${SMTP_FROM:-}
      MAIL_FROM_NAME: ${MAIL_FROM_NAME:-}
      MAIL_ADMIN_TO: ${MAIL_ADMIN_TO:-}
      IMAP_ENABLED: ${IMAP_ENABLED:-false}
      IMAP_HOST: ${IMAP_HOST:-}
      IMAP_PORT: ${IMAP_PORT:-993}
      IMAP_USER: ${IMAP_USER:-}
      IMAP_PASS: ${IMAP_PASS:-}
      IMAP_TLS: ${IMAP_TLS:-true}
      IMAP_POLL_INTERVAL_SECONDS: ${IMAP_POLL_INTERVAL_SECONDS:-60}
      APP_PUBLIC_URL: ${APP_PUBLIC_URL:-}
    volumes:
      - ./bind/primary/zones:/bind/primary/zones
      - ./bind/primary:/bind/primary/conf
      - ./bind/keys:/etc/rndc:ro
    networks:
      - internal
      - public

  # ── Web UI ───────────────────────────────────────────────────
  web:
    build: ./web
    restart: unless-stopped
    environment:
      VITE_API_URL: ${PUBLIC_API_URL:-http://localhost:3000}
    ports:
      - "80:80"
    networks:
      - public

  # ── Hidden Primary BIND (ns1 — 80.243.196.37) ────────────
  # Secondaries: ilreah (80.243.196.38), ulren (80.243.196.39)
  # They are deployed separately — see bind/secondary2/ and bind/secondary3/
  bind-primary:
    image: internetsystemsconsortium/bind9:9.18
    restart: unless-stopped
    volumes:
      - ./bind/primary/named.conf:/etc/bind/named.conf:ro
      - ./bind/primary/named.conf.options:/etc/bind/named.conf.options:ro
      - ./bind/primary/named.conf.local:/etc/bind/named.conf.local
      - ./bind/keys:/etc/bind/keys:ro
      - ./bind/primary/zones:/zones
    ports:
      - "53:53/tcp"       # AXFR zone transfers from secondaries
      - "53:53/udp"       # NOTIFY to secondaries
    networks:
      - internal          # Worker/API reach BIND via internal network
      - public            # Secondaries reach BIND for zone transfers + NOTIFY
    expose:
      - "953/tcp"         # rndc (internal only)

networks:
  internal:
    driver: bridge
    internal: true    # no direct internet egress; primary is isolated here
  public:
    driver: bridge

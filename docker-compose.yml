services:

  # ── Database ────────────────────────────────────────────────
  db:
    image: mariadb:11
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MYSQL_DATABASE: infodns
      MYSQL_USER: infodns
      MYSQL_PASSWORD: ${DB_PASSWORD}
    volumes:
      - ./mariadb/data:/var/lib/mysql
      - ./mariadb/init:/docker-entrypoint-initdb.d
    networks:
      - internal
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 30s

  # PHPMYADMIN with auto login on port 8080
  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    restart: unless-stopped
    environment:
      PMA_HOST: db
      PMA_USER: infodns
      PMA_PASSWORD: ${DB_PASSWORD}
    ports:
      - "8080:80"
    networks:
      - internal
      - public

  # ── API ─────────────────────────────────────────────────────
  api:
    build: ./api
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_HOST: db
      DB_PORT: 3306
      DB_USER: infodns
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: infodns
      JWT_SECRET: ${JWT_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      INTERNAL_SECRET: ${INTERNAL_SECRET}
      NODE_ENV: ${NODE_ENV:-production}
    ports:
      - "3000:3000"
    networks:
      - internal
      - public

  # ── Worker ──────────────────────────────────────────────────
  worker:
    build: ./worker
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_HOST: db
      DB_PORT: 3306
      DB_USER: infodns
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: infodns
      BIND_PRIMARY_HOST: bind-primary
      BIND_PRIMARY_RNDC_PORT: 953
      RNDC_KEY_FILE: /etc/rndc/rndc.key
      # Real secondary IPs for also-notify in named.conf.local (ns3, ns2)
      SECONDARY_IPS: ${SECONDARY_IPS:-5.78.139.169,89.167.67.148}
      NS_RECORDS: ${NS_RECORDS}          # comma-separated NS FQDNs for zone rendering
      SOA_MNAME: ${SOA_MNAME}
      SOA_RNAME: ${SOA_RNAME}
      INTERNAL_SECRET: ${INTERNAL_SECRET}
      API_INTERNAL_URL: http://api:3000
      NODE_ENV: ${NODE_ENV:-production}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_FROM: ${SMTP_FROM:-}
      MAIL_ADMIN_TO: ${MAIL_ADMIN_TO:-}
    volumes:
      - ./bind/primary/zones:/bind/primary/zones
      - ./bind/primary:/bind/primary/conf
      - ./bind/rndc.key:/etc/rndc/rndc.key:ro
    networks:
      - internal
      - public

  # ── Web UI ───────────────────────────────────────────────────
  web:
    build: ./web
    restart: unless-stopped
    environment:
      VITE_API_URL: ${PUBLIC_API_URL:-http://localhost:3000}
    ports:
      - "80:80"
    networks:
      - public

  # ── Hidden Primary BIND (ns1 — 168.119.122.226) ────────────
  # Secondaries run on real external servers: ns3 (5.78.139.169), ns2 (89.167.67.148)
  # They are deployed separately — see bind/secondary-ns3/ and bind/secondary-ns2/
  bind-primary:
    image: internetsystemsconsortium/bind9:9.18
    restart: unless-stopped
    volumes:
      - ./bind/primary/named.conf:/etc/bind/named.conf:ro
      - ./bind/primary/named.conf.options:/etc/bind/named.conf.options:ro
      - ./bind/primary/named.conf.local:/etc/bind/named.conf.local:ro
      - ./bind/tsig.key:/etc/bind/tsig.key:ro
      - ./bind/rndc.key:/etc/bind/rndc.key:ro
      - ./bind/primary/zones:/var/lib/bind/zones
    networks:
      - internal          # NOT on public network — hidden primary
    expose:
      - "53/tcp"
      - "53/udp"
      - "953/tcp"         # rndc

networks:
  internal:
    driver: bridge
    internal: true    # no direct internet egress; primary is isolated here
  public:
    driver: bridge
